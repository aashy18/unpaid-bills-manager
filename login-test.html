<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Login Function Test</h1>
    
    <div class="test-section">
        <h2>Test doLogin Function</h2>
        <button onclick="testDoLogin()">Test doLogin Function</button>
        <div id="doLoginResult"></div>
    </div>
    
    <div class="test-section">
        <h2>Manual Login Test</h2>
        <input type="text" id="testUser" placeholder="Username" value="admin">
        <input type="password" id="testPass" placeholder="Password" value="admin">
        <button onclick="testManualLogin()">Test Login</button>
        <div id="manualResult"></div>
    </div>

    <script>
        // Simplified version of the login function for testing
        const DEFAULT_ADMIN = {
            id: 'admin_default',
            fullName: 'Administrator',
            username: 'admin',
            password: 'admin',
            role: 'admin',
            createdAt: Date.now()
        };

        function loadUsers() {
            try {
                const users = localStorage.getItem('appUsers');
                return users ? JSON.parse(users) : [];
            } catch (error) {
                console.error('Error loading users:', error);
                return [];
            }
        }

        function testDoLogin() {
            const result = document.getElementById('doLoginResult');
            
            // Check if the function exists in the main page
            fetch('./index.html')
                .then(response => response.text())
                .then(html => {
                    if (html.includes('function doLogin()')) {
                        result.innerHTML = '<span class="success">✅ doLogin function found in index.html</span>';
                        
                        // Try to evaluate if there are syntax errors
                        try {
                            // Simple check for basic syntax
                            const functionMatch = html.match(/function doLogin\(\) \{[\s\S]*?\n\}/);
                            if (functionMatch) {
                                result.innerHTML += '<br><span class="success">✅ Function syntax appears valid</span>';
                            } else {
                                result.innerHTML += '<br><span class="error">❌ Function syntax may be invalid</span>';
                            }
                        } catch (e) {
                            result.innerHTML += '<br><span class="error">❌ Error checking function: ' + e.message + '</span>';
                        }
                    } else {
                        result.innerHTML = '<span class="error">❌ doLogin function NOT found in index.html</span>';
                    }
                })
                .catch(error => {
                    result.innerHTML = '<span class="error">❌ Error loading index.html: ' + error.message + '</span>';
                });
        }

        function testManualLogin() {
            const username = document.getElementById('testUser').value;
            const password = document.getElementById('testPass').value;
            const result = document.getElementById('manualResult');
            
            try {
                let users = loadUsers();
                console.log('Available users:', users);
                
                let user = users.find(u => u.username === username && u.password === password);
                
                // Fallback to default admin
                if (!user && username === 'admin' && password === 'admin') {
                    user = DEFAULT_ADMIN;
                }
                
                if (user) {
                    result.innerHTML = '<span class="success">✅ Login successful! User: ' + user.fullName + '</span>';
                } else {
                    result.innerHTML = '<span class="error">❌ Login failed. Invalid credentials.</span>';
                }
            } catch (error) {
                result.innerHTML = '<span class="error">❌ Login error: ' + error.message + '</span>';
            }
        }
    </script>
</body>
</html>
